<th:block th:fragment="formErrorsFragment">
    <ul th:if="${#fields.hasAnyErrors()}" style="color: red;">
        <li
            th:each="err : ${#fields.allErrors().stream().sorted()}"
            th:with="errStrs = ${err.split('-', 3)}, errMsg = ${errStrs[2]}"
            th:data-error-field-name="${errFieldName}"
            th:text="${errMsg}">

        </li>
    </ul>

    <script>
        const forms = document.querySelectorAll('form');
        const forms = lastForm = forms[forms.length - 1];
        const errorFieldName = lastForm.querySelector('ul > li')?.dataset?.errorFieldName || '';
        if (errorFieldName.length > 0) {
            setTimeout(() => lastForm[errorFieldName].focus());
        }
    </script>
</th:block>
